<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>SisUni - CPPPAC</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/sp.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Font Awesome (já estava carregado) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="../static/style.css">
</head>

<body>
    <!---HEADER-->
    <nav class="navbar navbar-expand-lg navbar-light bg-nav">
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a href="/" class="nav-link"><i class="bi bi-arrow-left-circle-fill"></i> VOLTAR</a>
                </li>
                <li>
                    <a href="/lista" class="nav-link"><i class="bi bi-card-list"></i> VER LISTA</a>
                </li>
            </ul>
            <div class="d-flex align-items-center">
                <a href="/"><img src="{{ url_for('static', filename='img/logo3.png') }}" class="rounded" alt="Logo"></a>
            </div>
        </div>
    </nav>
    <!----FIM DO HEADER-->

    <p></p>
    <p></p>
    <!-- SEÇÃO PRINCIPAL -->
    <div class="container mt-4">
        <div class="row">
            <!-- Coluna de Pesquisa -->
            <div class="col-md-6">
                <!-- Formulário de Pesquisa -->
                <div class="card mb-4 box-shadow" style="border: 1px solid #ccc; border-radius: 10px;">
                    <div class="card-header">
                        <h5 class="mb-0">1 - Pesquisar Sentenciado</h5>
                    </div>
                    <div class="card-body">
                        <form method="POST" id="search-form">
                            {{ form.csrf_token }}
                            <div class="d-flex gap-2">
                                <input type="text" class="form-control" id="matricula" placeholder="Matrícula"
                                    name="matricula" style="width: 30%;">
                                <input type="text" class="form-control" id="nome" placeholder="Nome" name="nome"
                                    style="width: 70%;">
                            </div>
                            <p></p>
                            <div>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-search"></i> Pesquisar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Coluna de Adicionar Visita -->
            <div class="col-md-6">
                <div class="card mb-4 box-shadow" style="border: 1px solid #ccc; border-radius: 10px;">
                    <div class="card-header">
                        <h5 class="mb-0">2 - Registrar Visita</h5>
                    </div>
                    <div class="card-body">
                        <form id="add-visit-form">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label for="garrafas" class="form-label">PETs</label>
                                    <input type="number" class="form-control" id="garrafas" name="garrafas" min="0" value="0">
                                </div>
                                <div class="col-md-4">
                                    <label for="homens" class="form-label">Homens</label>
                                    <input type="number" class="form-control" id="homens" name="homens" min="0" value="0">
                                </div>
                                <div class="col-md-4">
                                    <label for="mulheres" class="form-label">Mulheres</label>
                                    <input type="number" class="form-control" id="mulheres" name="mulheres" min="0" value="0">
                                </div>
                                <div class="col-md-4">
                                    <label for="criancas" class="form-label">Crianças</label>
                                    <input type="number" class="form-control" id="criancas" name="criancas" min="0" value="0">
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabela de Resultados -->
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card box-shadow" style="border: 1px solid #ccc; border-radius: 10px;">
                    <div class="card-header">
                        <h5 class="mb-0">3 - Adiciona o nome na lista.</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                            {{ resultados|safe }}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <script src="{{ url_for('static', filename='js/entrada_saida.js') }}"></script>
</body>

</html>
