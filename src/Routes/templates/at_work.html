<body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .retro-container {
            min-height: 100vh;
            background: #F8F8F8;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }


        /* Pixel text */
        .pixel-text {
            font-family: 'Press Start 2P', cursive;
            color: rgb(0, 0, 0);
            text-align: center;
            font-size: 2rem;
            line-height: 1.8;
            text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.3);
            margin: 2rem 0;
            position: relative;
            z-index: 10;
            max-width: 900px;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        /* Responsive image styling */
        .pixel-text img {
            max-width: 80%;
            max-height: 50vh;
            width: auto;
            height: auto;
            display: block;
            margin: 0 auto 2rem auto;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            .pixel-text img {
                max-width: 90%;
                max-height: 40vh;
            }
        }

        /* Hide original content */
        .work-container {
            display: none;
        }
    </style>
    </head>

    <body>

                            alt="Logo"></a>
                </div>
            </div>
        </nav>
        <!----FIM DO HEADER---->

        <!-- Retro Gaming Container -->
        <div class="retro-container">
            <!-- Top brick pattern -->
            <div class="brick-top"></div>

            <!-- Main message -->
            <div class="pixel-text">
