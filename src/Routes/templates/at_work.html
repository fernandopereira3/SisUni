<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>SisUni - CPPPAC - Agendamento de Folgas</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/sp.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>
    <style>
        .work-container {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .work-card {
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .work-icon {
            font-size: 5rem;
            color: #c59e4f;
            margin-bottom: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        .work-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #000000;
            margin-bottom: 1rem;
        }

        .work-subtitle {
            font-size: 1.2rem;
            color: #8c8b8a;
            margin-bottom: 2rem;
        }

        .progress-container {
            margin: 2rem 0;
        }

        .progress {
            height: 8px;
            border-radius: 10px;
            background-color: #f0f0f0;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #c59e4f 0%, #dc2828 100%);
            animation: loading 2s ease-in-out infinite;
        }

        @keyframes loading {
            0% {
                width: 0%;
            }

            50% {
                width: 70%;
            }

            100% {
                width: 100%;
            }
        }

        .features-list {
            text-align: left;
            margin: 2rem 0;
        }

        .feature-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: rgba(197, 158, 79, 0.1);
            border-left: 4px solid #c59e4f;
            border-radius: 8px;
        }

        .feature-item i {
            color: #c59e4f;
            margin-right: 1rem;
            font-size: 1.5rem;
        }

        .btn-back {
            background: linear-gradient(135deg, #c59e4f 0%, #dc2828 100%);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(197, 158, 79, 0.3);
            color: white;
        }

        .spinner-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 1.5rem 0;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #c59e4f;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }
    </style>
    </head>

    <body>
        <!---HEADER--->
        <nav class="navbar navbar-expand-lg bg-nav">
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item">
                        <a href="/" class="nav-link"><i class="bi bi-arrow-left-circle-fill"></i> VOLTAR</a>
                    </li>
                </ul>
                <div class="navbar-brand">
                    <a href="/"><img src="{{ url_for('rotas.static', filename='img/logo3.png') }}" class="rounded"
                            alt="Logo"></a>
                </div>
            </div>
        </nav>
        <!----FIM DO HEADER---->

        <!-- Conteúdo Principal -->
        <div class="work-container">
            <div class="work-card">
                <!-- Ícone Animado -->
                <div class="work-icon">
                    <i class="bi bi-tools"></i>
                </div>

                <!-- Título -->
                <h1 class="work-title">Em Desenvolvimento</h1>
                <p class="work-subtitle">Estamos trabalhando aqui</p>

                <!-- Spinner de Loading -->
                <div class="spinner-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>

                <!-- Barra de Progresso -->
                <div class="progress-container">
                    <div class="progress">
                        <div class="progress-bar" role="progressbar"></div>
                    </div>
                </div>

                <!-- Lista de Features -->
                <div class="features-list">
                    <div class="feature-item">
                        <i class="bi bi-check-circle-fill"></i>
                        <span>Interface em desenvolvimento</span>
                    </div>
                </div>

                <!-- Mensagem -->
                <p style="color: #8c8b8a; margin: 1.5rem 0;">
                    <i class="bi bi-info-circle"></i>
                    Esta funcionalidade estará disponível em breve. Agradecemos sua compreensão!
                </p>

                <!-- Botão Voltar -->
                <a href="/" class="btn-back">
                    <i class="bi bi-arrow-left me-2"></i>Voltar ao Dashboard
                </a>
            </div>
        </div>

        <!-- Footer -->
        <footer class="bg-light border-top mt-5">
            <div class="container">
                <div class="row py-3">
                    <div class="col-12 text-center">
                        <span class="text-muted" style="font-size: 0.875rem;">
                            &copy; 2025 Fernando Pereira | Versão do sistema: DEV
                        </span>
                    </div>
                </div>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>

</html>
