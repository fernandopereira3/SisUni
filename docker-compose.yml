services:
  web:
    image: fernandopereira3/sisuni:latest
    ports:
      - "80:5000"
    networks:
      - app-network
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/
      - MYSQL_URI=mysql+mysqlconnector://root:futuro07@10.14.180.254:3309/siscar
    restart: always

  mongo:
    image: fernandopereira3/sisuni_db:latest
    container_name: mongo
    ports:
      - "27017:27017"
    networks:
      - app-network
    volumes:
      - mongo_data:/data/db
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: C:\sisuniVOL\
